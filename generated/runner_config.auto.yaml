mode: paper
connection:
  host: 127.0.0.1
  gateway: true
  client_id: 10
  timeout: 30
schedule:
  timezone: America/New_York
  entry_time: 09:35
  exit_time: '15:45'
  lookback_bars: 200
  earnings_blackout_days: 5
symbols_file: symbols.txt
strategies:
- name: SMACrossover
  params: {}
- name: EMACrossover
  params:
    fast: 12
    slow: 26
- name: RSIMeanReversion
  params: {}
sizing:
  method: fixed_fraction
  risk_pct: 0.01
  stop_pct: 0.02
  reward_ratio: 2.0
  target_vol: 0.1
  max_position_pct: 0.1
  allow_short: false
risk:
  max_drawdown_pct: 0.05
  max_open_positions: 10
logging:
  level: INFO
  file: logs/daily_runner.log
notifications:
  webhook:
    enabled: false
    url: ''
  email:
    enabled: true
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: ${EMAIL_USER}
    password: ${EMAIL_PASS}
    from_addr: ${EMAIL_USER}
    to_addr: ${EMAIL_USER}
auto_selection:
  enabled: true
  source_run_id: '20260308_055045'
  selection_rules:
    top_n: 3
    min_symbols: 5
    min_sharpe: 0.0
    min_trades: 50.0
    max_drawdown_abs: 0.35
    fallback_to_top_n_if_empty: true
  selected_count: 3
